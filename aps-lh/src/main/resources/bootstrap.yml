server:
  port: 9669

nacos:
  #  server-addr: 192.168.2.93:8848
  server-addr: 127.0.0.1:8848
# Spring
spring:
  # 添加了后端的swagger接口才会显示
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  application:
    # 应用名称
    name: aps-lh
  profiles:
    # 环境配置
    active: test
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      discovery:
        # 服务注册地址
        server-addr: ${nacos.server-addr}
      config:
        # 配置中心地址
        server-addr: ${nacos.server-addr}
        # 配置文件格式
        file-extension: yml
        # 共享配置
        shared-configs[0]:
          data-id: application-aps-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}
        shared-configs[1]:
          data-id: druid_aps_${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}
        shared-configs[2]:
          data-id: system-frame-aps-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}
        shared-configs[3]:
          data-id: system-api-prefix-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}
        shared-configs[4]:
          data-id: zipkin-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}
        shared-configs[5]:
          data-id: sync-data-aps-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}
        # 自动刷新配置文件
        refresh-enabled: true
